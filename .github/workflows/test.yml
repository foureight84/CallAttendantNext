name: Tests

on:
  push:
    branches: [main, oop-refactor]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests (excluding live Nomorobo)
        run: npx vitest run --reporter=verbose --exclude='tests/modem/nomorobo.test.ts'

  nomorobo:
    name: Nomorobo Live Check
    runs-on: ubuntu-latest
    # Run on push to main only (not every PR) to avoid hammering nomorobo.com
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Nomorobo live check
        run: npx vitest run --reporter=verbose tests/modem/nomorobo.test.ts
        # If this fails: either site layout changed (scraper needs update) or
        # number 3157859930 is no longer listed — update the test number.
        continue-on-error: true
